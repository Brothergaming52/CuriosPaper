      - Ability System: systems/ability-system.md
      - Item System: systems/item-system.md
      - Recipe System: systems/recipe-system.md
      - Mob Drop System: systems/mob-drop-system.md
      - Villager Trade System: systems/villager-trade-system.md
      - 3D Model System: systems/3d-model-system.md
